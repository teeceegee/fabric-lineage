<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabric Pipeline Dashboard - dev-prescriptions-process v3</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e1e;
            color: #d4d4d4;
            overflow: hidden;
        }
        #header {
            background: #2d2d30;
            padding: 15px 20px;
            border-bottom: 2px solid #007acc;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 {
            color: #4fc3f7;
            font-size: 24px;
            font-weight: 300;
        }
        #controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .filter-btn {
            background: #0e639c;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }
        .filter-btn:hover { background: #1177bb; }
        .filter-btn.active { background: #007acc; box-shadow: 0 0 10px rgba(0,122,204,0.5); }
        #search {
            padding: 8px 12px;
            border: 1px solid #3e3e42;
            background: #252526;
            color: #d4d4d4;
            border-radius: 4px;
            font-size: 13px;
            width: 300px;
            cursor: pointer;
        }
        #search option {
            background: #252526;
            color: #d4d4d4;
        }
        #container {
            display: flex;
            height: calc(100vh - 65px);
        }
        #graph {
            flex: 1;
            position: relative;
        }
        #sidebar {
            width: 350px;
            background: #252526;
            border-left: 1px solid #3e3e42;
            overflow-y: auto;
            padding: 20px;
        }
        #sidebar h2 {
            color: #4fc3f7;
            font-size: 18px;
            margin-bottom: 15px;
            font-weight: 400;
        }
        .info-section {
            margin-bottom: 20px;
        }
        .info-label {
            color: #858585;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }
        .info-value {
            color: #d4d4d4;
            font-size: 14px;
            margin-bottom: 12px;
        }
        .activity-list {
            max-height: 400px;
            overflow-y: auto;
            margin-top: 10px;
        }
        .activity-item {
            background: #2d2d30;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 4px;
            border-left: 3px solid #007acc;
        }
        .activity-number {
            color: #ffeb3b;
            font-weight: bold;
            font-size: 12px;
            margin-right: 8px;
        }
        .activity-name {
            color: #4fc3f7;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 4px;
        }
        .activity-type {
            color: #858585;
            font-size: 11px;
            margin-bottom: 4px;
        }
        .activity-deps {
            color: #9575cd;
            font-size: 10px;
            font-style: italic;
        }
        .legend {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(45, 45, 48, 0.95);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #3e3e42;
        }
        .legend-title {
            color: #4fc3f7;
            font-size: 14px;
            margin-bottom: 10px;
            font-weight: 500;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 12px;
        }
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }
        .stats {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(45, 45, 48, 0.95);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #3e3e42;
            font-size: 12px;
        }
        .stat-item {
            margin-bottom: 5px;
        }
        .stat-label {
            color: #858585;
        }
        .stat-value {
            color: #4fc3f7;
            font-weight: 500;
        }
        svg {
            width: 100%;
            height: 100%;
        }
        .node {
            cursor: pointer;
            stroke: #1e1e1e;
            stroke-width: 2px;
        }
        .node:hover {
            stroke: #4fc3f7;
            stroke-width: 3px;
        }
        .node.selected {
            stroke: #ffeb3b;
            stroke-width: 4px;
        }
        .link {
            stroke: #3e3e42;
            stroke-opacity: 0.6;
            stroke-width: 2px;
            fill: none;
        }
        .link.highlighted {
            stroke: #4fc3f7;
            stroke-opacity: 1;
            stroke-width: 3px;
        }
        .node-label {
            fill: #d4d4d4;
            font-size: 11px;
            pointer-events: none;
            text-anchor: middle;
        }
        .sequence-label {
            fill: #ffeb3b;
            font-size: 14px;
            font-weight: bold;
            pointer-events: none;
            text-anchor: middle;
            stroke: #1e1e1e;
            stroke-width: 0.5px;
            paint-order: stroke;
        }
        .empty-state {
            color: #858585;
            font-style: italic;
            font-size: 13px;
        }
    </style>
</head>

    <div id="header">
        <h1>[PIPELINES] Fabric Pipeline Dashboard - dev-prescriptions-process</h1>
        <div id="controls">
            <select id="search">

            <button class="filter-btn active" data-category="all">All</button>

            <button class="filter-btn" data-category="bronze">Bronze</button>

            <button class="filter-btn" data-category="gold">Gold</button>

    <div id="container">
        <div id="graph">
            <div class="legend">
                <div class="legend-title">Pipeline Types</div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #ff6b6b;"></div>

                <div class="legend-item">
                    <div class="legend-color" style="background: #cd7f32;"></div>
                    <span>Bronze Layer</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #c0c0c0;"></div>
                    <span>Silver Layer</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #ffd700;"></div>
                    <span>Gold Layer</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #4fc3f7;"></div>
                    <span>Extract</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #9575cd;"></div>
                    <span>Utility</span>
                </div>
            </div>
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-label">Total Pipelines: </span>
                    <span class="stat-value" id="stat-total">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Visible: </span>
                    <span class="stat-value" id="stat-visible">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Dependencies: </span>
                    <span class="stat-value" id="stat-links">0</span>
                </div>
            </div>
        </div>
        <div id="sidebar">
            <h2>Pipeline Details</h2>
            <div class="empty-state">Select a pipeline node to view details</div>
        </div>
    </div>

rEachSilverJobs"]],"type":"TridentNotebook"},{"name":"SetMessageFromSilverFailure","dependsOn":[["NotebookSilverFailure"]],"type":"SetVariable"},{"name":"Office 365 Outlook Silver failed message","dependsOn":[["SetMessageFromSilverFailure"]],"type":"Office365Outlook"}],"schedule":null,"scheduleType":"none","activityCount":5,"category":"silver"},{"id":"b8a3d4c1-01e8-4326-bd2a-2e195eeea91c","name":"pl_sow4_gold_load","activities":[{"name":"LookupSow4Jobs","dependsOn":[[]],"type":"Lookup"},{"name":"ForEachSow4Jobs","dependsOn":[["LookupSow4Jobs"]],"type":"ForEach"},{"name":"NotebookSow4Failure","dependsOn":[["ForEachSow4Jobs"]],"type":"TridentNotebook"},{"name":"SetMessageFromSow4Failure","dependsOn":[["NotebookSow4Failure"]],"type":"SetVariable"},{"name":"Office 365 Outlook Sow4 failed message","dependsOn":[["SetMessageFromSow4Failure"]],"type":"Office365Outlook"}],"schedule":null,"scheduleType":"none","activityCount":5,"category":"gold"},{"id":"9743e8c4-ae7d-4c4d-9298-dda8bd878c76","name":"Refresh semantic model","activities":[{"name":"Semantic model refresh - Epact form item element","dependsOn":[[]],"type":"PBISemanticModelRefresh"}],"schedule":null,"scheduleType":"none","activityCount":1,"category":"utility"},{"id":"604623b4-b9fc-436c-a86a-52f936973b61","name":"sow11_create_semantic_model","activities":[{"name":"disable attribute hierachies","dependsOn":[[]],"type":"TridentNotebook"}],"schedule":null,"scheduleType":"none","activityCount":1,"category":"utility"},{"id":"45d1ff03-161e-46fd-9912-c1b5bfe183ff","name":"sow11_epact_sm_creation_pipeline","activities":[{"name":"sm_creation","dependsOn":[[]],"type":"TridentNotebook"},{"name":"apply_standard_properties","dependsOn":[["sm_creation"]],"type":"TridentNotebook"},{"name":"apply_measures","dependsOn":[["apply_standard_properties"]],"type":"TridentNotebook"}],"schedule":null,"scheduleType":"none","activityCount":3,"category":"utility"},{"id":"2e368a45-dbb3-4914-89f6-c0c1c741c375","name":"sow11_pipeline","activities":[{"name":"Create Models","dependsOn":[[]],"type":"TridentNotebook"},{"name":"Rename Models","dependsOn":[["Create Models"]],"type":"TridentNotebook"},{"name":"Add Measures to Models","dependsOn":[["Rename Models"]],"type":"ForEach"}],"schedule":null,"scheduleType":"none","activityCount":3,"category":"utility"},{"id":"c193f9c9-b53d-4b72-a3f6-b25dc9de4d72","name":"sow11_pipeline_copy1","activities":[{"name":"Create Models","dependsOn":[[]],"type":"TridentNotebook"},{"name":"Rename Models","dependsOn":[["Create Models"]],"type":"TridentNotebook"},{"name":"Add Measures to Models","dependsOn":[["Rename Models"]],"type":"ForEach"}],"schedule":null,"scheduleType":"none","activityCount":3,"category":"utility"},{"id":"789f6a1c-3742-440e-87e0-10eb82c79ed3","name":"Suture Run for 1.3","activities":[{"name":"Suture_Pipeline_Run","dependsOn":[[]],"type":"TridentNotebook"}],"schedule":null,"scheduleType":"none","activityCount":1,"category":"utility"},{"id":"0452d601-f4cc-495a-896d-7c42451eac2b","name":"Table maintenance","activities":[{"name":"Run table maintenance","dependsOn":[[]],"type":"TridentNotebook"}],"schedule":null,"scheduleType":"none","activityCount":1,"category":"utility"}];
        const links = [{"activityName":"eps_process_bronze","target":"72fcba30-0e7e-4000-abca-e2e00d332f95","source":"67a594ba-edde-425b-8df0-f8f40e6ad1e5","order":1},{"activityName":"eps_process_silver","target":"be6e1f3e-6128-4467-a068-ca9d787462a7","source":"67a594ba-edde-425b-8df0-f8f40e6ad1e5","order":2},{"activityName":"eps_process_gold","target":"0311bc10-d8e8-48d5-be2c-71d493dd90b6","source":"67a594ba-edde-425b-8df0-f8f40e6ad1e5","order":3},{"activityName":"Invoke llf silver pipeline","target":"da8a3054-3049-4127-a1a5-c384c437652c","source":"15c23efb-bacc-49e4-9f2a-3abb14d76c98","order":1},{"activityName":"Invoke llf gold pipeline","target":"3e586a50-4557-4d13-96ad-550fb0e1e9dc","source":"15c23efb-bacc-49e4-9f2a-3abb14d76c98","order":2},{"activityName":"Invoke llf bronze pipeline","target":"371ceba8-6c45-4c69-9877-0f0793e95f0f","source":"15c23efb-bacc-49e4-9f2a-3abb14d76c98","order":3},{"activityName":"Invoke Sow4 pipeline","target":"b8a3d4c1-01e8-4326-bd2a-2e195eeea91c","source":"15c23efb-bacc-49e4-9f2a-3abb14d76c98","order":4},{"activityName":"Invoke finance bronze pipeline","target":"1fc17ed3-2418-4284-8a67-e30ec502b2ce","source":"a77e191b-bc0a-4bca-840c-5f506b0e86b1","order":1},{"activityName":"Invoke silver pipeline","target":"ce547c3d-8a19-42cc-a2e6-a89583141c78","source":"90819cdd-e94f-4f66-9c5d-592671e7eb2e","order":1},{"activityName":"Invoke gold pipeline","target":"6c5f7d7a-77f8-422d-82dd-9574e53480cf","source":"90819cdd-e94f-4f66-9c5d-592671e7eb2e","order":2}];
        
        const categoryColors = {
            orchestrator: '#ff6b6b',
            bronze: '#cd7f32',
            silver: '#c0c0c0',
            gold: '#ffd700',
            extract: '#4fc3f7',
            utility: '#9575cd'
        };

        let currentFilter = 'all';
        let selectedNode = null;

        const container = d3.select('#graph');
        const width = container.node().clientWidth;
        const height = container.node().clientHeight;

        const svg = container.append('svg').attr('width', width).attr('height', height);
        const g = svg.append('g');

        const zoom = d3.zoom().scaleExtent([0.1, 4]).on('zoom', (event) => {
            g.attr('transform', event.transform);
        });
        svg.call(zoom);

        const simulation = d3.forceSimulation(nodes)
            .force('link', d3.forceLink(links).id(d => d.id).distance(150))
            .force('charge', d3.forceManyBody().strength(-800))
            .force('center', d3.forceCenter(width / 2, height / 2))
            .force('collision', d3.forceCollide().radius(40));

        const link = g.append('g').selectAll('path').data(links).join('path')
            .attr('class', 'link').attr('marker-end', 'url(#arrowhead)');

        svg.append('defs').append('marker').attr('id', 'arrowhead')
            .attr('viewBox', '0 -5 10 10').attr('refX', 25).attr('refY', 0)
            .attr('markerWidth', 6).attr('markerHeight', 6).attr('orient', 'auto')
            .append('path').attr('d', 'M0,-5L10,0L0,5').attr('fill', '#3e3e42');

        const node = g.append('g').selectAll('circle').data(nodes).join('circle')
            .attr('class', 'node')
            .attr('r', d => 15 + (d.activityCount * 0.5))
            .attr('fill', d => categoryColors[d.category])
            .call(d3.drag()
                .on('start', dragstarted)
                .on('drag', dragged)
                .on('end', dragended))
            .on('click', (event, d) => { event.stopPropagation(); selectNode(d); });

        const label = g.append('g').selectAll('text').data(nodes).join('text')
            .attr('class', 'node-label').attr('dy', 30)
            .text(d => d.name.length > 25 ? d.name.substring(0, 25) + '...' : d.name);

        const sequenceLabel = g.append('g').selectAll('text').data(links).join('text')
            .attr('class', 'sequence-label')
            .text(d => d.order ? d.order : '');

        simulation.on('tick', () => {
            link.attr('d', d => {
                const dx = d.target.x - d.source.x;
                const dy = d.target.y - d.source.y;
                const dr = Math.sqrt(dx * dx + dy * dy);
                return `M${d.source.x},${d.source.y}A${dr},${dr} 0 0,1 ${d.target.x},${d.target.y}`;
            });
            node.attr('cx', d => d.x).attr('cy', d => d.y);
            label.attr('x', d => d.x).attr('y', d => d.y);
            sequenceLabel
                .attr('x', d => (d.source.x + d.target.x) / 2)
                .attr('y', d => (d.source.y + d.target.y) / 2);
        });

        function dragstarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x; d.fy = d.y;
        }
        function dragged(event, d) { d.fx = event.x; d.fy = event.y; }
        function dragended(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null; d.fy = null;
        }

        function selectNode(d) {
            selectedNode = d;
            console.log('Node selected:', d.name, 'Activities:', d.activities ? d.activities.length : 0);
            node.classed('selected', n => n.id === d.id);
            link.classed('highlighted', l => l.source.id === d.id || l.target.id === d.id);
            updateSidebar(d);
        }

        function updateSidebar(d) {
            console.log('updateSidebar called for:', d.name);
            const sidebar = d3.select('#sidebar');
            console.log('Sidebar found:', !sidebar.empty());
            
            const scheduleText = d.schedule ? 
                d.schedule.configuration.type + ' - ' + (d.schedule.configuration.times ? d.schedule.configuration.times.join(', ') : 'N/A') :
                'No schedule';
            const incoming = links.filter(l => l.target.id === d.id).length;
            const outgoing = links.filter(l => l.source.id === d.id).length;
            
            // Build activities list HTML
            let activitiesHtml = '';
            if (d.activities && d.activities.length > 0) {
                activitiesHtml = '<div class="info-section"><div class="info-label">Pipeline Activities</div><div class="activity-list">';
                d.activities.forEach((act, idx) => {
                    const deps = Array.isArray(act.dependsOn) ? act.dependsOn : (act.dependsOn ? [act.dependsOn] : []);
                    const depsText = deps.length > 0 ? 
                        '<div class="activity-deps">Depends on: ' + deps.join(', ') + '</div>' : '';
                    activitiesHtml += '<div class="activity-item">' +
                        '<span class="activity-number">#' + (idx + 1) + '</span>' +
                        '<div class="activity-name">' + act.name + '</div>' +
                        '<div class="activity-type">Type: ' + act.type + '</div>' +
                        depsText +
                        '</div>';
                });
                activitiesHtml += '</div></div>';
            }
            
            sidebar.html(
                '<h2>' + d.name + '</h2>' +
                '<div class="info-section">' +
                    '<div class="info-label">Category</div>' +
                    '<div class="info-value" style="color: ' + categoryColors[d.category] + '">' + d.category.toUpperCase() + '</div>' +
                '</div>' +
                '<div class="info-section">' +
                    '<div class="info-label">Summary</div>' +
                    '<div class="info-value">' + d.activityCount + ' activities | ' + incoming + ' incoming | ' + outgoing + ' outgoing</div>' +
                '</div>' +
                '<div class="info-section">' +
                    '<div class="info-label">Schedule</div>' +
                    '<div class="info-value">' + scheduleText + '</div>' +
                '</div>' +
                activitiesHtml +
                '<div class="info-section" style="margin-top: 20px;">' +
                    '<div class="info-label">Pipeline ID</div>' +
                    '<div class="info-value" style="font-size: 10px; word-break: break-all;">' + d.id + '</div>' +
                '</div>'
            );
            console.log('Sidebar updated successfully. Activities:', d.activities ? d.activities.length : 0);
        }

        d3.selectAll('.filter-btn').on('click', function() {
            const category = d3.select(this).attr('data-category');
            d3.selectAll('.filter-btn').classed('active', false);
            d3.select(this).classed('active', true);
            currentFilter = category;
            applyFilter();
        });

        // Populate search dropdown with alphabetically sorted pipelines
        const sortedNodes = nodes.slice().sort((a, b) => a.name.localeCompare(b.name));
        const searchSelect = d3.select('#search');
        sortedNodes.forEach(pipeline => {
            searchSelect.append('option')
                .attr('value', pipeline.name)
                .text(pipeline.name);
        });

        d3.select('#search').on('change', applyFilter);

        function applyFilter() {
            const selectedPipeline = d3.select('#search').property('value');
            node.style('opacity', d => {
                const categoryMatch = currentFilter === 'all' || d.category === currentFilter;
                const searchMatch = !selectedPipeline || d.name === selectedPipeline;
                return (categoryMatch && searchMatch) ? 1 : 0.1;
            });
            label.style('opacity', d => {
                const categoryMatch = currentFilter === 'all' || d.category === currentFilter;
                const searchMatch = !selectedPipeline || d.name === selectedPipeline;
                return (categoryMatch && searchMatch) ? 1 : 0.1;
            });
            const visibleCount = nodes.filter(d => {
                const categoryMatch = currentFilter === 'all' || d.category === currentFilter;
                const searchMatch = !selectedPipeline || d.name === selectedPipeline;
                return categoryMatch && searchMatch;
            }).length;
            d3.select('#stat-visible').text(visibleCount);
            
            // Auto-select the pipeline if filtering to just one
            if (selectedPipeline) {
                const selectedNode = nodes.find(n => n.name === selectedPipeline);
                if (selectedNode) {
                    selectNode(selectedNode);
                }
            }
        }

        svg.on('click', () => {
            node.classed('selected', false);
            link.classed('highlighted', false);
            d3.select('#sidebar').html('<h2>Pipeline Details</h2><div class="empty-state">Select a pipeline node to view details</div>');
        });

        d3.select('#stat-total').text(nodes.length);
        d3.select('#stat-visible').text(nodes.length);
        d3.select('#stat-links').text(links.length);
    </script>
</body>
</html>
